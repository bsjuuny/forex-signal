name: FX Data Update & Deploy

on:
  schedule:
    # 3시간 간격 8회/일 (UTC 기준, KST = UTC+9), 평일(월~금)만 실행
    # UTC 00,03,06,09,12,15,18,21 → KST 09,12,15,18,21,00,03,06
    - cron: '0 0,3,6,9,12,15,18,21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect exchange rate data
        run: npm run data:update
        env:
          KOREAEXIM_API_KEY: ${{ secrets.KOREAEXIM_API_KEY }}

      - name: Save data to git (백업용)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add public/data/exchange_rates.json
          git diff --staged --quiet && exit 0
          git commit -m "data: update fx signals [skip ci]"
          git push

      - name: Send Telegram notification
        run: npm run notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
