name: FX Data Update & Deploy

on:
  schedule:
    # KST 09:00, 12:00, 15:00, 18:00 (UTC 00:00, 03:00, 06:00, 09:00)
    - cron: '0 0,3,6,9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect exchange rate data
        run: npm run data:update
        env:
          KOREAEXIM_API_KEY: ${{ secrets.KOREAEXIM_API_KEY }}

      - name: Save data to git (백업용)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add public/data/exchange_rates.json
          git commit -m "data: update fx signals [skip ci]" || exit 0
          git push

      - name: Build static site
        run: npm run build
        env:
          KOREAEXIM_API_KEY: ${{ secrets.KOREAEXIM_API_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
