name: FX Data Update & Deploy

on:
  schedule:
    # 평일 매시 45분 실행 (KST 기준 = UTC 기준 동일 분, 평일 UTC Mon-Fri)
    - cron: '45 * * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect exchange rate data
        run: npm run data:update
        env:
          KOREAEXIM_API_KEY: ${{ secrets.KOREAEXIM_API_KEY }}

      - name: Save data to git (백업용)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add public/data/exchange_rates.json
          git diff --staged --quiet && exit 0
          git commit -m "data: update fx signals [skip ci]"
          git push

      - name: Send Telegram notification
        run: npm run notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
